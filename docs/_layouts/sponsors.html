---
layout: default
---

<style>
  /* Scoped to the sponsors page only via .sponsors-page wrapper. */
  .sponsors-page .text-eyebrow {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6b7780;
    margin-bottom: 6px;
  }
  .sponsors-page .text-eyebrow--amber { color: #f59e0b; font-weight: 700; }
  .sponsors-page .text-eyebrow--on-dark { color: rgba(255, 255, 255, 0.7); }

  .sponsors-page .btn-amber {
    background: #f59e0b;
    color: #111;
    font-weight: 600;
    border: 0;
  }
  .sponsors-page .btn-amber:hover { background: #d97706; color: #111; }

  .sponsors-page .btn-outline-on-dark {
    background: transparent;
    color: #fff;
    border: 1px solid #fff;
  }
  .sponsors-page .btn-outline-on-dark:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

  .sponsors-page .section-band--light { background: #f8f9fa; padding: 64px 0; }
  .sponsors-page .section-band--white { background: #fff; padding: 64px 0; }
  .sponsors-page .section-band--accent { background: #fafbfc; padding: 64px 0; }
  .sponsors-page .section-band--dark { background: #1f2c34; color: #fff; padding: 64px 0; }

  .sponsors-page .card-flat {
    background: #fff;
    border: 1px solid #e3e7ea;
    border-radius: 8px;
  }

  .sponsors-page .stat-strip {
    display: flex;
    gap: 32px;
    justify-content: center;
    flex-wrap: wrap;
    border-top: 1px solid #2d3e4a;
    padding-top: 20px;
    margin-top: 10px;
  }
  .sponsors-page .stat-strip__value { font-size: 28px; font-weight: 700; line-height: 1; }
  .sponsors-page .stat-strip__label {
    font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px;
  }

  .sponsors-page .sponsor-tile {
    background: #fafbfc;
    border: 1px solid #e3e7ea;
    border-radius: 6px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    position: relative;
    text-decoration: none;
    color: #1f2c34;
    font-weight: 600;
    font-size: 13px;
    text-align: center;
  }
  .sponsors-page .sponsor-tile:hover { border-color: #1f2c34; text-decoration: none; }
  .sponsors-page .sponsor-tile img { max-width: 100%; max-height: 100%; }
  .sponsors-page .sponsor-tile__badge {
    position: absolute;
    top: 4px;
    right: 4px;
    background: #f59e0b;
    color: #111;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .sponsors-page .badge-founding {
    background: #f59e0b;
    color: #111;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: inline-block;
  }

  .sponsors-page .impact-panel {
    background: #fafbfc;
    border: 1px solid #e3e7ea;
    border-radius: 8px;
    padding: 24px;
  }

  .sponsors-page .tier-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    background: #fff;
    border: 1px solid #e3e7ea;
    border-radius: 8px;
    overflow: hidden;
  }
  .sponsors-page .tier-table thead th {
    background: #1f2c34;
    color: #fff;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px 16px;
  }
  .sponsors-page .tier-table td { padding: 13px 16px; border-bottom: 1px solid #e3e7ea; color: #475560; }
  .sponsors-page .tier-table tbody tr:nth-child(even) { background: #fafbfc; }
  .sponsors-page .tier-table tbody tr:last-child td { border-bottom: 0; }
  .sponsors-page .tier-table__amount { color: #1f2c34; font-weight: 600; }
  .sponsors-page .tier-table__amount-note { color: #6b7780; font-size: 12px; margin-left: 4px; }
</style>

<div class="sponsors-page">
  <!-- Section markup will be added by subsequent tasks. -->
</div>
