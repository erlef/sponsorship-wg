# Sponsor data for the home page.
#
# Schema for each entry:
#   name:     Display name (string, required)
#   url:      Sponsor's website (string, required)
#   logo:     Path under /assets/images/sponsors/ (string, optional — falls back to text tile if missing)
#   founding: true if the sponsor was one of the 8 founding members in 2019 (boolean, default false)
